<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#07111F" />
<title>MAM — AI Commerce OS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#07111F;}
  #root{min-height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;



/* ════════════════════════════════════════════════════════════
   MAM — AI Commerce OS
   3 portals: Customer • Merchant • Advertiser
   Palette: navy / blue / green (+ violet for advertiser zone)
════════════════════════════════════════════════════════════ */

const C = {
  navy: "#07111F", card: "#0D1B2E", card2: "#111E33",
  blue: "#1A6FFF", green: "#00C896", white: "#FFFFFF",
  muted: "#6B80A0", border: "rgba(30,111,255,.18)", gBorder: "rgba(0,200,150,.22)",
  violet: "#7C3AED", vBorder: "rgba(124,58,237,.28)", amber: "#F59E0B", red: "#EF4444",
};
const grad = (a = C.blue, b = C.green, deg = 135) => `linear-gradient(${deg}deg,${a},${b})`;
const pill = (bg, color, extra = {}) => ({ background: bg, color, borderRadius: 999, padding: "4px 12px", fontSize: 11, fontWeight: 700, ...extra });

function Logo({ size = 44 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#1A6FFF" /><stop offset="55%" stopColor="#00C896" /><stop offset="100%" stopColor="#fff" stopOpacity=".85" />
        </linearGradient>
        <filter id="gf"><feGaussianBlur stdDeviation="2.5" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
      </defs>
      <ellipse cx="32" cy="26" rx="21" ry="23" fill="url(#lg1)" filter="url(#gf)" />
      <path d="M32 49 Q29 56 32 62" stroke={C.green} strokeWidth="1.8" strokeLinecap="round" fill="none" />
      <circle cx="32" cy="63" r="1.8" fill={C.green} />
      <text x="32" y="21" textAnchor="middle" fontFamily="Arial Black,sans-serif" fontWeight="900" fontSize="9.5" fill="white" letterSpacing="-.4">MAM</text>
      <text x="32" y="34" textAnchor="middle" fontFamily="Arial,sans-serif" fontWeight="800" fontSize="11" fill="white" opacity=".9">%</text>
    </svg>
  );
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2400); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: "fixed", top: 72, left: "50%", transform: "translateX(-50%)", background: grad(), color: "#fff", borderRadius: 12, padding: "10px 22px", fontSize: 13, fontWeight: 700, zIndex: 9999, boxShadow: "0 6px 24px rgba(0,0,0,.4)", whiteSpace: "nowrap" }}>
      ✓ {msg}
    </div>
  );
}

const GlobalStyle = () => (
  <style>{`
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body,input,textarea,select{font-family:'Cairo',sans-serif}
    .btn{cursor:pointer;border:none;transition:all .18s;font-family:'Cairo',sans-serif}
    .btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
    .btn:active{transform:scale(.97)}
    .card{transition:box-shadow .2s}
    .card:hover{box-shadow:0 8px 32px rgba(26,111,255,.18)}
    input:focus,textarea:focus,select:focus{outline:none;border-color:${C.blue}!important}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:${C.navy}}::-webkit-scrollbar-thumb{background:${C.blue}55;border-radius:2px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .fadein{animation:fadeIn .3s ease}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .pulse{animation:pulse 1.8s infinite}
    @keyframes bid{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
    .bidpulse{animation:bid .6s ease}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite}
    @keyframes glowmove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  `}</style>
);

/* ════════════════════════════════════════════════════════════
   ROOT APP — Role gate
════════════════════════════════════════════════════════════ */
function App() {
  const [role, setRole] = useState(null); // null | customer | merchant | advertiser
  const [toast, setToast] = useState(null);
  const showToast = m => setToast(m);

  return (
    <div style={{ fontFamily: "Cairo,sans-serif", direction: "rtl", background: C.navy, minHeight: "100vh", color: C.white }}>
      <GlobalStyle />
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      {!role && <RoleGate onPick={setRole} />}
      {role === "customer" && <CustomerApp showToast={showToast} onExit={() => setRole(null)} />}
      {role === "merchant" && <MerchantApp showToast={showToast} onExit={() => setRole(null)} />}
      {role === "advertiser" && <AdvertiserApp showToast={showToast} onExit={() => setRole(null)} />}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   ROLE GATE
════════════════════════════════════════════════════════════ */
function RoleGate({ onPick }) {
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 20px", background: `radial-gradient(ellipse at 50% 0%, rgba(30,111,255,.18) 0%, transparent 65%)` }}>
      <Logo size={88} />
      <div style={{ fontSize: 12, color: C.green, fontWeight: 700, letterSpacing: 3, marginTop: 18, textTransform: "uppercase" }}>AI Commerce Operating System</div>
      <h1 style={{ fontSize: "clamp(26px,6vw,38px)", fontWeight: 900, textAlign: "center", marginTop: 10, marginBottom: 6 }}>
        <span style={{ background: grad(), WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>MAM</span>
      </h1>
      <div style={{ color: C.muted, fontSize: 13, textAlign: "center", marginBottom: 36, maxWidth: 320, lineHeight: 1.7 }}>
        شبكة واحدة تربط التاجر، العميل، والمعلن — بالذكاء الاصطناعي
      </div>

      <div style={{ width: "100%", maxWidth: 380, display: "grid", gap: 12 }}>
        {[
          { id: "customer", icon: "🛍️", title: "أنا عميل", desc: "تسوّق، قارن، اشترِ بذكاء", color: C.blue },
          { id: "merchant", icon: "🏪", title: "أنا تاجر", desc: "أدر متجرك بالذكاء الاصطناعي", color: C.green },
          { id: "advertiser", icon: "📢", title: "أنا معلن", desc: "زايد واستهدف عملاءك الحقيقيين", color: C.violet },
        ].map(r => (
          <button key={r.id} className="btn card" onClick={() => onPick(r.id)}
            style={{ background: C.card, border: `1px solid ${r.color}33`, borderRadius: 16, padding: "16px 18px", display: "flex", alignItems: "center", gap: 14, textAlign: "right" }}>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: `${r.color}22`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>{r.icon}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 800, fontSize: 15 }}>{r.title}</div>
              <div style={{ fontSize: 12, color: C.muted }}>{r.desc}</div>
            </div>
            <div style={{ color: r.color, fontSize: 18 }}>←</div>
          </button>
        ))}
      </div>

      <div style={{ marginTop: 32, display: "flex", gap: 18, fontSize: 11, color: C.muted }}>
        <span>📱 iOS</span><span>🤖 Android</span><span>🌐 Web</span>
      </div>
    </div>
  );
}

/* portal header used by all 3 apps */
function PortalHeader({ title, color, onExit }) {
  return (
    <nav style={{ background: "rgba(7,17,31,.97)", backdropFilter: "blur(14px)", borderBottom: `1px solid ${color}33`, padding: "0 16px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 58, position: "sticky", top: 0, zIndex: 100 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <Logo size={34} />
        <div>
          <div style={{ fontWeight: 900, fontSize: 14, color }}>MAM</div>
          <div style={{ fontSize: 9, color: C.muted }}>{title}</div>
        </div>
      </div>
      <button className="btn" onClick={onExit} style={{ background: "transparent", color: C.muted, fontSize: 12, border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 12px" }}>تبديل الحساب ⇄</button>
    </nav>
  );
}

function BottomNav({ items, active, setActive, color }) {
  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(7,17,31,.98)", backdropFilter: "blur(14px)", borderTop: `1px solid ${color}33`, display: "flex", justifyContent: "space-around", padding: "8px 0 14px", zIndex: 90 }}>
      {items.map(it => (
        <button key={it.id} className="btn" onClick={() => setActive(it.id)} style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, background: "transparent", padding: "4px 6px", minWidth: 50 }}>
          <span style={{ fontSize: 17, position: "relative" }}>
            {it.icon}
            {!!it.badge && <span style={{ position: "absolute", top: -4, left: -8, background: C.red, color: "#fff", borderRadius: "50%", width: 14, height: 14, fontSize: 8, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center" }}>{it.badge}</span>}
          </span>
          <span style={{ fontSize: 9, color: active === it.id ? color : C.muted, fontWeight: active === it.id ? 700 : 400 }}>{it.label}</span>
          {active === it.id && <div style={{ width: 5, height: 5, borderRadius: "50%", background: color, marginTop: 1 }} />}
        </button>
      ))}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   ░░░ CUSTOMER APP ░░░
════════════════════════════════════════════════════════════ */
function CustomerApp({ showToast, onExit }) {
  const [tab, setTab] = useState("home");
  const [cart, setCart] = useState(2);
  const [unread, setUnread] = useState(3);
  const TABS = [
    { id: "home", icon: "🔍", label: "البحث" },
    { id: "mall", icon: "🏬", label: "المول" },
    { id: "allstores", icon: "🗂️", label: "كل المتاجر" },
    { id: "map", icon: "📍", label: "الخريطة" },
    { id: "cart", icon: "🛒", label: "السلة" },
    { id: "messages", icon: "💬", label: "رسائلي", badge: unread },
    { id: "wallet", icon: "💳", label: "محفظتي" },
    { id: "invoice", icon: "🧾", label: "فاتورتي" },
  ];
  return (
    <div style={{ paddingBottom: 80 }}>
      <PortalHeader title="بوابة العميل" color={C.blue} onExit={onExit} />
      <div className="fadein" key={tab}>
        {tab === "home" && <CustomerHome showToast={showToast} setCart={setCart} setTab={setTab} />}
        {tab === "mall" && <VirtualMall showToast={showToast} setCart={setCart} />}
        {tab === "allstores" && <AllStoresHub showToast={showToast} />}
        {tab === "map" && <GeoMap showToast={showToast} />}
        {tab === "cart" && <SmartCart showToast={showToast} cart={cart} setCart={setCart} setTab={setTab} />}
        {tab === "messages" && <CustomerMessages showToast={showToast} unread={unread} setUnread={setUnread} />}
        {tab === "wallet" && <LoyaltyWallet showToast={showToast} />}
        {tab === "invoice" && <CustomerInvoice showToast={showToast} />}
      </div>
      <BottomNav items={TABS} active={tab} setActive={setTab} color={C.blue} />
    </div>
  );
}

/* — Customer: Home / AI Search + Shopper Agent — */
function CustomerHome({ showToast, setCart, setTab }) {
  const [q, setQ] = useState("");
  const [agentMsg, setAgentMsg] = useState("");
  const [agentReply, setAgentReply] = useState(null);
  const [thinking, setThinking] = useState(false);
  const [results, setResults] = useState(null);

  const suggestions = ["ساعة ذكية بـ100 ريال", "أرخص هاتف متوفر", "سماعة لاسلكية", "هدية لعيد ميلاد صديقي"];

  const runAgent = (text) => {
    setThinking(true); setAgentReply(null); setResults(null);
    setTimeout(() => {
      setThinking(false);
      if (text.includes("ساعة")) {
        setAgentReply({ summary: "قارنت 14 ساعة ذكية ضمن ميزانيتك — هذا أفضل خيار:", pick: { n: "ساعة Xiaomi Smart Band 9", p: "95", store: "متجر التقنية", why: "أعلى تقييم ضمن حدود 100 ريال + توصيل خلال ساعتين", img: "⌚" } });
      } else if (text.includes("هاتف") || text.includes("أرخص")) {
        setAgentReply({ summary: "بحثت بين 47 متجر عن أرخص هاتف بمواصفات جيدة:", pick: { n: "Redmi Note 13", p: "699", store: "موبايل سنتر", why: "أقل سعر مع ضمان رسمي سنة كاملة", img: "📱" } });
      } else if (text.includes("هدية")) {
        setAgentReply({ summary: "اقترحت هدايا حسب المناسبة وميزانية متوسطة:", pick: { n: "سماعة JBL + بطاقة هدية", p: "249", store: "صوت وصورة", why: "الأعلى تقييماً كهدية أعياد ميلاد هذا الشهر", img: "🎁" } });
      } else {
        setResults([
          { n: "سماعة Sony WH-1000XM5", p: "999", store: "صوت وصورة", img: "🎧", rate: 4.9 },
          { n: "سماعة JBL Tune", p: "199", store: "متجر التقنية", img: "🎧", rate: 4.5 },
          { n: "سماعة Apple AirPods Pro", p: "799", store: "آبل ستور", img: "🎧", rate: 4.8 },
        ]);
      }
    }, 1300);
  };

  return (
    <div style={{ padding: "20px 16px" }}>
      <div style={{ textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 12, color: C.green, fontWeight: 700, letterSpacing: 2 }}>AI SHOPPER AGENT</div>
        <h2 style={{ fontWeight: 900, fontSize: 19, marginTop: 4 }}>قل لي وش تبي، وأنا أدبرها</h2>
      </div>

      {/* AI agent input */}
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 14, marginBottom: 14 }}>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="مثال: أبغى ساعة بـ100 ريال..."
            style={{ flex: 1, background: C.card2, border: `1px solid ${C.border}`, borderRadius: 10, padding: "11px 14px", color: C.white, fontSize: 13 }} />
          <button className="btn" onClick={() => q.trim() && runAgent(q)}
            style={{ background: grad(), color: C.white, borderRadius: 10, padding: "0 18px", fontSize: 13, fontWeight: 700 }}>🤖</button>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 10 }}>
          {suggestions.map(s => (
            <button key={s} className="btn" onClick={() => { setQ(s); runAgent(s); }}
              style={{ background: `${C.blue}15`, color: C.blue, border: `1px solid ${C.blue}33`, borderRadius: 999, padding: "5px 12px", fontSize: 11 }}>{s}</button>
          ))}
        </div>
      </div>

      {thinking && (
        <div style={{ textAlign: "center", padding: "24px 0", color: C.muted, fontSize: 13 }}>
          <div className="spin" style={{ width: 28, height: 28, border: `3px solid ${C.border}`, borderTop: `3px solid ${C.green}`, borderRadius: "50%", margin: "0 auto 10px" }} />
          AI يقارن بين المتاجر...
        </div>
      )}

      {agentReply && (
        <div className="fadein" style={{ background: `linear-gradient(135deg,rgba(0,200,150,.1),rgba(26,111,255,.08))`, border: `1px solid ${C.gBorder}`, borderRadius: 16, padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.green, fontWeight: 700, marginBottom: 10 }}>🤖 {agentReply.summary}</div>
          <div style={{ display: "flex", gap: 12, alignItems: "center", background: C.card2, borderRadius: 12, padding: 12 }}>
            <div style={{ fontSize: 32 }}>{agentReply.pick.img}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 13 }}>{agentReply.pick.n}</div>
              <div style={{ fontSize: 11, color: C.muted }}>{agentReply.pick.store}</div>
              <div style={{ fontWeight: 900, fontSize: 16, color: C.green }}>{agentReply.pick.p} ر.س</div>
            </div>
          </div>
          <div style={{ fontSize: 11, color: C.muted, margin: "8px 0 12px" }}>💡 {agentReply.pick.why}</div>
          <button className="btn" onClick={() => { setCart(c => c + 1); showToast("✅ AI أضافها لسلتك مباشرة!"); }}
            style={{ width: "100%", background: grad(), color: C.white, borderRadius: 10, padding: "10px 0", fontSize: 13, fontWeight: 700 }}>
            ⚡ اشترِها الآن نيابة عني
          </button>
        </div>
      )}

      {results && (
        <div className="fadein" style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 10 }}>وجدت {results.length} نتائج من متاجر مختلفة:</div>
          {results.map(r => (
            <div key={r.n} className="card" style={{ background: C.card, borderRadius: 12, padding: 12, border: `1px solid ${C.border}`, display: "flex", gap: 10, alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontSize: 26 }}>{r.img}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 12 }}>{r.n}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{r.store} · ⭐ {r.rate}</div>
              </div>
              <div style={{ fontWeight: 900, fontSize: 14, color: C.green }}>{r.p}</div>
              <button className="btn" onClick={() => { setCart(c => c + 1); showToast("أُضيف للسلة"); }} style={{ background: grad(), color: "#fff", borderRadius: 8, padding: "6px 10px", fontSize: 11 }}>+</button>
            </div>
          ))}
        </div>
      )}

      {/* quick actions */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 18 }}>
        <button className="btn" onClick={() => setTab("mall")} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "16px 12px", textAlign: "center" }}>
          <div style={{ fontSize: 24, marginBottom: 6 }}>🏬</div>
          <div style={{ fontWeight: 700, fontSize: 12 }}>تجول في المول الافتراضي</div>
        </button>
        <button className="btn" onClick={() => { setCart(c => c + 1); showToast("⚡ شراء فوري — تم الدفع!"); }} style={{ background: `linear-gradient(135deg,${C.green},${C.blue})`, borderRadius: 14, padding: "16px 12px", textAlign: "center" }}>
          <div style={{ fontSize: 24, marginBottom: 6 }}>⚡</div>
          <div style={{ fontWeight: 700, fontSize: 12 }}>شراء فوري بدون سلة</div>
        </button>
      </div>
    </div>
  );
}

/* — Customer: Virtual Mall (store crawling) — */
function VirtualMall({ showToast, setCart }) {
  const [floor, setFloor] = useState("الطابق الأرضي");
  const FLOORS = {
    "الطابق الأرضي": { stores: [{ n: "متجر التقنية", icon: "💻", color: C.blue, dist: "0.8 كم" }, { n: "صوت وصورة", icon: "🎧", color: C.green, dist: "1.2 كم" }] },
    "الطابق الأول": { stores: [{ n: "أزياء عصرية", icon: "👕", color: C.violet, dist: "2.1 كم" }, { n: "بيت الجمال", icon: "💄", color: "#EC4899", dist: "1.5 كم" }] },
    "طابق الطعام": { stores: [{ n: "سوبر ماركت السعادة", icon: "🛒", color: C.amber, dist: "0.5 كم" }, { n: "مخبز الأصالة", icon: "🍞", color: C.red, dist: "0.9 كم" }] },
  };
  return (
    <div style={{ padding: "18px 16px" }}>
      <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 4 }}>🏬 المول الافتراضي العالمي</div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 16 }}>تجوّل بين آلاف المتاجر بدون تطبيقات متعددة</div>

      <div style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto" }}>
        {Object.keys(FLOORS).map(f => (
          <button key={f} className="btn" onClick={() => setFloor(f)}
            style={{ background: floor === f ? grad() : C.card2, color: floor === f ? "#fff" : C.muted, borderRadius: 999, padding: "8px 16px", fontSize: 12, fontWeight: 700, whiteSpace: "nowrap" }}>{f}</button>
        ))}
      </div>

      {/* "near you" live map style list */}
      <div style={{ background: `linear-gradient(135deg,rgba(26,111,255,.12),rgba(0,200,150,.06))`, border: `1px solid ${C.border}`, borderRadius: 14, padding: 12, marginBottom: 14, display: "flex", alignItems: "center", gap: 10 }}>
        <span className="pulse" style={{ width: 8, height: 8, borderRadius: "50%", background: C.green }} />
        <div style={{ fontSize: 12, color: C.muted }}>📍 يعرض المتاجر القريبة منك الآن بالمخزون الفوري</div>
      </div>

      <div style={{ display: "grid", gap: 12 }}>
        {FLOORS[floor].stores.map(s => (
          <div key={s.n} className="card" style={{ background: C.card, borderRadius: 14, padding: 14, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 50, height: 50, borderRadius: 14, background: `${s.color}22`, border: `2px solid ${s.color}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{s.icon}</div>
            <div style={{ flex: 1 }}>

/* — Merchant: Reverse Marketplace (مزاد الطلبات) — */
function ReverseMarketplace({ showToast }) {
  const [offers, setOffers] = useState([
    { id: 1, customer: "عميل في الرياض", item: "لابتوب Gaming بميزانية 4000 ر.س", time: "منذ 3 دقائق", bids: 4, myOffer: null },
    { id: 2, customer: "عميل في جدة", item: "كاميرا تصوير فيديو احترافية", time: "منذ 8 دقائق", bids: 7, myOffer: "2,650 ر.س" },
  ]);
  const [bidVal, setBidVal] = useState("");
  const [active, setActive] = useState(null);

  const submitOffer = (id) => {
    if (!bidVal) return;
    setOffers(o => o.map(x => x.id === id ? { ...x, myOffer: bidVal + " ر.س", bids: x.bids + 1 } : x));

    setActive(null); setBidVal("");
  };

  return (
    <div style={{ padding: "18px 16px" }}>
      <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 4 }}>🔥 مزاد الطلبات العكسي</div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 16 }}>العميل يطلب — المتاجر تتنافس بأفضل عرض</div>

      {offers.map(o => (
        <div key={o.id} className="card" style={{ background: C.card, borderRadius: 14, padding: 14, border: `1px solid ${C.border}`, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>

            <span style={{ fontSize: 10, color: C.muted }}>{o.time}</span>
          </div>
          <div style={{ fontSize: 13, marginBottom: 8 }}>{o.item}</div>
          <div style={{ fontSize: 11, color: C.amber, marginBottom: 10 }}>🔴 {o.bids} عروض منافسة حتى الآن</div>
          {o.myOffer ? (
            <div style={{ background: `${C.green}15`, color: C.green, borderRadius: 9, padding: "8px 12px", fontSize: 12, fontWeight: 700, textAlign: "center" }}>عرضك: {o.myOffer} ✓</div>
          ) : active === o.id ? (
            <div style={{ display: "flex", gap: 8 }}>
              <input value={bidVal} onChange={e => setBidVal(e.target.value)} placeholder="السعر بالريال" style={{ flex: 1, background: C.card2, border: `1px solid ${C.border}`, borderRadius: 9, padding: "9px 12px", color: "#fff" }} />
              <button className="btn" onClick={() => submitOffer(o.id)} style={{ background: grad(), color: "#fff", borderRadius: 9, padding: "9px 16px", fontWeight: 700 }}>قدّم</button>
            </div>
          ) : (
            <button className="btn" onClick={() => setActive(o.id)} style={{ width: "100%", background: `${C.blue}18`, color: C.blue, border: `1px solid ${C.border}`, borderRadius: 9, padding: "9px 0", fontWeight: 700, fontSize: 12 }}>قدّم عرضك الآن</button>
          )}
        </div>
      ))}
    </div>
  );
}

/* — Merchant: Multi-channel Messaging (SMS + Email + In-App, all paid) — */
function PaidMessaging({ showToast }) {
  const [view, setView] = useState("صندوق الوارد");
  const [msg, setMsg] = useState("");
  const [channels, setChannels] = useState({ app: true, sms: false, email: false });
  const COSTS = { app: 0.35, sms: 0.6, email: 0.15 };
  const CHANNEL_LABEL = { app: "📱 داخل التطبيق", sms: "✉️ SMS", email: "📧 إيميل" };
  const [balance, setBalance] = useState(120.5);
  const [sentCount, setSentCount] = useState(0);
  const [log, setLog] = useState([]);
  const [schedMode, setSchedMode] = useState("ai"); // "ai" | "manual"
  const [manualDate, setManualDate] = useState("");
  const [manualTime, setManualTime] = useState("");
  const [queue, setQueue] = useState([
    { id: 1, text: "تذكير: عرض نهاية الأسبوع ينتهي قريباً", when: "اليوم 7:30 م", mode: "AI اختار الوقت", channels: "📱 + ✉️" },
  ]);

  const chats = [
    { name: "أحمد محمد", last: "هل متوفر باللون الأسود؟", time: "الآن", unread: 1, avatar: "👨" },
    { name: "سارة العمري", last: "شكراً للتوصيل السريع", time: "أمس", unread: 0, avatar: "👩" },
  ];
  const TEMPLATES = ["مرحباً! كيف أقدر أساعدك؟", "عرض خاص لك: خصم 15% اليوم فقط!", "طلبك رقم #1234 في الطريق 🚚"];

  const activeChannels = Object.entries(channels).filter(([, v]) => v).map(([k]) => k);
  const costPerCustomer = activeChannels.reduce((s, k) => s + COSTS[k], 0);
  const totalCost = +(costPerCustomer * chats.length).toFixed(2);

  const toggleChannel = k => setChannels(c => ({ ...c, [k]: !c[k] }));

  const sendBulk = () => {
    if (activeChannels.length === 0) { showToast("⚠️ اختر قناة إرسال واحدة على الأقل"); return; }
    if (totalCost > balance) { showToast("⚠️ رصيدك غير كافٍ — اشحن رصيد الرسائل"); return; }
    setBalance(b => +(b - totalCost).toFixed(2));
    setSentCount(s => s + chats.length);
    setLog(l => [{ channels: activeChannels.map(c => CHANNEL_LABEL[c]).join(" + "), reach: chats.length, cost: totalCost, t: "الآن" }, ...l]);
    showToast(`📤 أُرسلت عبر ${activeChannels.length} قناة لـ ${chats.length} عملاء — خُصم ${totalCost} ر.س`);
  };

  const scheduleBulk = () => {
    if (!msg.trim()) { showToast("⚠️ اكتب نص الرسالة أولاً"); return; }
    if (activeChannels.length === 0) { showToast("⚠️ اختر قناة إرسال واحدة على الأقل"); return; }
    let whenLabel;
    if (schedMode === "ai") {
      whenLabel = "AI اختار: غداً 7:45 م (أعلى احتمال فتح)";
    } else {
      if (!manualDate || !manualTime) { showToast("⚠️ حدد التاريخ والوقت"); return; }
      whenLabel = `${manualDate} — ${manualTime}`;
    }
    setQueue(q => [{ id: Date.now(), text: msg, when: whenLabel, mode: schedMode === "ai" ? "AI اختار الوقت" : "وقت يدوي", channels: activeChannels.map(c => CHANNEL_LABEL[c].split(" ")[0]).join(" ") }, ...q]);
    showToast(schedMode === "ai" ? "🤖 جدولت الرسالة — AI سيرسلها بأفضل توقيت" : "✅ جدولت الرسالة للوقت المحدد");
    setMsg("");
  };

  return (
    <div style={{ padding: "18px 16px" }}>
      <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 4 }}>💬 مركز الرسائل متعدد القنوات</div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 14 }}>SMS + إيميل + إشعار داخل التطبيق — كل قناة برسوم منفصلة</div>

      <div style={{ background: `linear-gradient(135deg,${C.green}18,${C.blue}10)`, border: `1px solid ${C.gBorder}`, borderRadius: 14, padding: 14, marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div><div style={{ fontSize: 11, color: C.muted }}>رصيد الرسائل</div><div style={{ fontWeight: 900, fontSize: 20, color: C.green }}>{balance.toFixed(2)} ر.س</div></div>
        <button className="btn" onClick={() => { setBalance(b => b + 50); showToast("✅ شحن 50 ر.س"); }} style={{ background: grad(), color: "#fff", borderRadius: 9, padding: "9px 16px", fontSize: 12, fontWeight: 700 }}>اشحن رصيد +</button>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 16, background: C.card2, borderRadius: 12, padding: 4, overflowX: "auto" }}>
        {["صندوق الوارد", "إرسال جماعي", "جدولة مستقبلية", "سجل الإرسال"].map(v => (
          <button key={v} className="btn" onClick={() => setView(v)} style={{ flex: 1, background: view === v ? grad() : C.card2, color: view === v ? "#fff" : C.muted, borderRadius: 9, padding: "8px 4px", fontSize: 10.5, fontWeight: 700, whiteSpace: "nowrap" }}>{v}</button>
        ))}
      </div>

      {view === "صندوق الوارد" && chats.map((c, i) => (
        <div key={i} style={{ background: C.card, borderRadius: 12, padding: 12, border: `1px solid ${C.border}`, marginBottom: 10, display: "flex", gap: 10, alignItems: "center" }}>
          <div style={{ width: 40, height: 40, borderRadius: "50%", background: grad(), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{c.avatar}</div>
          <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 13 }}>{c.name}</div><div style={{ fontSize: 11, color: C.muted }}>{c.last}</div></div>
          {c.unread > 0 && <div style={{ width: 18, height: 18, borderRadius: "50%", background: C.green, color: C.navy, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 900 }}>{c.unread}</div>}
        </div>
      ))}

      {view === "إرسال جماعي" && (
        <div>
          {/* Channel picker */}
          <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8 }}>اختر القنوات</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 14 }}>
            {Object.keys(CHANNEL_LABEL).map(k => (
              <button key={k} className="btn" onClick={() => toggleChannel(k)}
                style={{ background: channels[k] ? `${C.blue}22` : C.card, border: `1px solid ${channels[k] ? C.border : C.border}`, borderRadius: 11, padding: "10px 6px", textAlign: "center" }}>
                <div style={{ fontSize: 16, marginBottom: 4 }}>{CHANNEL_LABEL[k].split(" ")[0]}</div>
                <div style={{ fontSize: 10, color: channels[k] ? C.blue : C.muted }}>{CHANNEL_LABEL[k].split(" ").slice(1).join(" ")}</div>
                <div style={{ fontSize: 9, color: C.muted, marginTop: 2 }}>{COSTS[k]} ر.س</div>
              </button>
            ))}
          </div>

          <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>
            سيُرسل عبر {activeChannels.length || 0} قناة لـ {chats.length} عملاء — التكلفة: <b style={{ color: C.amber }}>{totalCost.toFixed(2)} ر.س</b>
          </div>

          {TEMPLATES.map((t, i) => (
            <button key={i} className="btn" onClick={() => setMsg(t)} style={{ display: "block", width: "100%", textAlign: "right", background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 12, marginBottom: 8 }}>{t}</button>
          ))}
          <textarea value={msg} onChange={e => setMsg(e.target.value)} rows={3} placeholder="أو اكتب رسالتك..." style={{ width: "100%", background: C.card2, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 13, resize: "none", marginBottom: 10 }} />
          <button className="btn" onClick={sendBulk} style={{ width: "100%", background: grad(), color: "#fff", borderRadius: 12, padding: "13px 0", fontWeight: 900 }}>📤 إرسال الآن</button>

        </div>
      )}

      {view === "جدولة مستقبلية" && (
        <div>
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>اختر متى تُرسل الرسالة — يدوياً أو بقرار من AI</div>

          {/* mode toggle */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
            <button className="btn" onClick={() => setSchedMode("ai")}
              style={{ background: schedMode === "ai" ? `${C.green}22` : C.card, border: `1px solid ${schedMode === "ai" ? C.gBorder : C.border}`, borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
              <div style={{ fontSize: 18, marginBottom: 4 }}>🤖</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: schedMode === "ai" ? C.green : C.white }}>AI يختار الوقت</div>
              <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>أعلى احتمال فتح</div>
            </button>
            <button className="btn" onClick={() => setSchedMode("manual")}
              style={{ background: schedMode === "manual" ? `${C.blue}22` : C.card, border: `1px solid ${schedMode === "manual" ? C.border : C.border}`, borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
              <div style={{ fontSize: 18, marginBottom: 4 }}>📅</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: schedMode === "manual" ? C.blue : C.white }}>أحدد الوقت بنفسي</div>
              <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>تاريخ ووقت يدوي</div>

          {schedMode === "ai" ? (
            <div style={{ background: `${C.green}10`, border: `1px solid ${C.gBorder}`, borderRadius: 12, padding: 12, marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: C.green, fontWeight: 700, marginBottom: 6 }}>🤖 توقع AI لأفضل وقت</div>
              <div style={{ fontSize: 12, color: C.muted }}>بناءً على سلوك عملائك: غداً <b style={{ color: "#fff" }}>7:45 مساءً</b> — احتمال فتح متوقع 78%</div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
              <div>
                <label style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 5 }}>التاريخ</label>

function StoreScore({ showToast }) {
  const metrics = [{ l: "سرعة التوصيل", v: 92, c: C.blue }, { l: "رضا العملاء", v: 96, c: C.green }, { l: "جودة المنتجات", v: 89, c: C.violet }, { l: "الرد السريع", v: 98, c: C.amber }];
  const score = Math.round(metrics.reduce((s, m) => s + m.v, 0) / metrics.length);
  const [anim, setAnim] = useState(false);
  useEffect(() => { setTimeout(() => setAnim(true), 200); }, []);
  return (
    <div style={{ padding: "18px 16px" }}>
      <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 16 }}>⭐ نقاط متجرك (Store Score)</div>
      <div style={{ textAlign: "center", marginBottom: 20 }}>
        <div style={{ width: 130, height: 130, borderRadius: "50%", margin: "0 auto", background: `conic-gradient(${C.green} ${score * 3.6}deg, ${C.card2} 0deg)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ width: 104, height: 104, borderRadius: "50%", background: C.navy, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontWeight: 900, fontSize: 30, color: C.green }}>{score}</div>
            <div style={{ fontSize: 10, color: C.muted }}>من 100</div>
          </div>
        </div>
        <div style={{ marginTop: 10, fontSize: 12, color: C.green, fontWeight: 700 }}>أعلى من 88% من المتاجر — يظهر بنتائج البحث الأولى</div>
      </div>
      {metrics.map(m => (
        <div key={m.l} style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 5 }}><span style={{ color: C.muted }}>{m.l}</span><span style={{ color: m.c, fontWeight: 700 }}>{m.v}%</span></div>
          <div style={{ height: 8, background: C.card2, borderRadius: 999, overflow: "hidden" }}><div style={{ height: "100%", width: anim ? `${m.v}%` : "0%", background: m.c, borderRadius: 999, transition: "width 1s" }} /></div>
        </div>
      ))}
    </div>
  );
}

        {tab === "invoiceAd" && <InvoiceAdTargeting showToast={showToast} />}
        {tab === "targeting" && <Targeting showToast={showToast} />}
        {tab === "report" && <AdReport />}
      </div>
      <BottomNav items={TABS} active={tab} setActive={setTab} color={C.violet} />
    </div>
  );
}

function LiveBidding({ showToast }) {
  const [slots, setSlots] = useState([
    { id: 1, name: "بحث: ساعات ذكية", top: 4.2, time: 12, competitors: 6 },
    { id: 2, name: "فاتورة: مشتري آيفون", top: 6.8, time: 28, competitors: 9 },
    { id: 3, name: "صفحة منتج: لابتوبات", top: 3.1, time: 45, competitors: 4 },
  ]);
  const [myBid, setMyBid] = useState({});
  const [won, setWon] = useState({});
  const [anim, setAnim] = useState(null);

  useEffect(() => {
    const t = setInterval(() => setSlots(s => s.map(x => ({ ...x, time: x.time > 0 ? x.time - 1 : 60 }))), 1000);
    return () => clearInterval(t);
  }, []);

  const bid = (id, top) => {
    const v = myBid[id] || top + 1;
    if (v <= top) { showToast("زد المبلغ"); return; }
    setSlots(s => s.map(x => x.id === id ? { ...x, top: v } : x));
    setWon(w => ({ ...w, [id]: true }));
    setAnim(id); setTimeout(() => setAnim(null), 600);
    showToast(`🏆 فزت بمساحة "${slots.find(x => x.id === id).name}" بـ ${v} ر.س`);
  };

  return (
    <div style={{ padding: "18px 16px" }}>
      <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 4 }}>⚡ مزايدة AI لحظية</div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 16 }}>Real-Time Bidding — يُحسم الفوز خلال أجزاء من الثانية</div>

      {slots.map(s => (
        <div key={s.id} className={anim === s.id ? "bidpulse" : ""} style={{ background: C.card, borderRadius: 14, padding: 14, border: `1px solid ${won[s.id] ? C.green : C.vBorder}`, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontWeight: 700, fontSize: 13 }}>{s.name}</span>
            <span style={pill(won[s.id] ? `${C.green}22` : `${C.violet}22`, won[s.id] ? C.green : C.violet)}>{won[s.id] ? "🏆 فائز" : `${s.time}s`}</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.muted, marginBottom: 10 }}>
            <span>أعلى مزايدة: <b style={{ color: C.amber }}>{s.top.toFixed(1)} ر.س CPM</b></span>
            <span>منافسون: {s.competitors}</span>
          </div>
          {!won[s.id] && (
            <div style={{ display: "flex", gap: 8 }}>
              <input type="number" step="0.1" placeholder={`> ${s.top.toFixed(1)}`} onChange={e => setMyBid(m => ({ ...m, [s.id]: +e.target.value }))}
                style={{ flex: 1, background: C.card2, border: `1px solid ${C.vBorder}`, borderRadius: 9, padding: "9px 12px", color: "#fff" }} />
              <button className="btn" onClick={() => bid(s.id, s.top)} style={{ background: grad(C.violet, C.blue), color: "#fff", borderRadius: 9, padding: "9px 18px", fontWeight: 700 }}>زايد ⚡</button>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function AdSpaces({ showToast }) {

/* — Advertiser: Buy ad space inside a SPECIFIC customer's invoice — */
function InvoiceAdTargeting({ showToast }) {
  const [picked, setPicked] = useState(null);
  const [adTitle, setAdTitle] = useState("");
  const [adPrice, setAdPrice] = useState("");
  const [sent, setSent] = useState({});

  const customers = [
    { id: 1, name: "أحمد محمد الغامدي", lastBuy: "iPhone 16 Pro Max", invoiceId: "#8841", time: "منذ دقيقتين", avatar: "👨", interest: "إلكترونيات" },
    { id: 2, name: "سارة العمري", lastBuy: "فستان سهرة", invoiceId: "#8839", time: "منذ ساعة", avatar: "👩", interest: "أزياء" },
    { id: 3, name: "خالد الزهراني", lastBuy: "لابتوب Gaming", invoiceId: "#8835", time: "منذ 3 ساعات", avatar: "👨‍💼", interest: "إلكترونيات" },
  ];

  const send = (id) => {
    if (!adTitle || !adPrice) { showToast("⚠️ أكمل بيانات الإعلان أولاً"); return; }
    setSent(s => ({ ...s, [id]: true }));
    showToast(`📨 أُرسل إعلانك ليظهر داخل فاتورة ${customers.find(c => c.id === id).name}`);
  };

  return (
    <div style={{ padding: "18px 16px" }}>
      <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 4 }}>🧾 استهداف عميل داخل فاتورته</div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 16 }}>اختر عميلاً محدداً — يظهر إعلانك في فاتورته القادمة مباشرة بعد الدفع</div>

      {/* Ad creative form */}
      <div style={{ background: C.card, borderRadius: 14, padding: 14, border: `1px solid ${C.vBorder}`, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10 }}>محتوى الإعلان</div>
        <input value={adTitle} onChange={e => setAdTitle(e.target.value)} placeholder="مثال: AirPods Pro 3 بعرض خاص"
          style={{ width: "100%", background: C.card2, border: `1px solid ${C.vBorder}`, borderRadius: 9, padding: "9px 12px", color: "#fff", fontSize: 12, marginBottom: 10 }} />
        <input value={adPrice} onChange={e => setAdPrice(e.target.value)} type="number" placeholder="السعر المعروض (ر.س)"
          style={{ width: "100%", background: C.card2, border: `1px solid ${C.vBorder}`, borderRadius: 9, padding: "9px 12px", color: "#fff", fontSize: 12 }} />
      </div>

      {/* AI-matched customers */}
      <div style={{ fontSize: 12, color: C.violet, fontWeight: 700, marginBottom: 10 }}>🤖 عملاء دفعوا للتو — مطابقون لاهتمامك</div>
      {customers.map(c => (
        <div key={c.id} className="card" style={{ background: C.card, borderRadius: 14, padding: 14, border: `1px solid ${sent[c.id] ? C.gBorder : C.border}`, marginBottom: 12 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 10 }}>
            <div style={{ width: 42, height: 42, borderRadius: "50%", background: grad(C.violet, C.blue), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 19 }}>{c.avatar}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 13 }}>{c.name}</div>
              <div style={{ fontSize: 11, color: C.muted }}>اشترى: {c.lastBuy} · فاتورة {c.invoiceId}</div>
            </div>
            <span style={{ fontSize: 10, color: C.muted }}>{c.time}</span>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
            <span style={pill(`${C.violet}18`, C.violet, { fontSize: 10 })}>اهتمام: {c.interest}</span>
            <span style={pill(`${C.green}18`, C.green, { fontSize: 10 })}>نية شراء عالية</span>
          </div>
          {sent[c.id] ? (
            <div style={{ background: `${C.green}15`, color: C.green, borderRadius: 9, padding: "8px 0", fontSize: 12, fontWeight: 700, textAlign: "center" }}>✓ تم الإرسال — بانتظار فتح العميل للفاتورة</div>
          ) : (
            <button className="btn" onClick={() => send(c.id)} style={{ width: "100%", background: grad(C.violet, C.blue), color: "#fff", borderRadius: 9, padding: "9px 0", fontWeight: 700, fontSize: 12 }}>
              📨 أرسل الإعلان لفاتورة هذا العميل
            </button>
          )}
        </div>
      ))}
    </div>
  );
}

function Targeting({ showToast }) {

  const OPTS = [{ k: "geo", l: "📍 الموقع الجغرافي", d: "استهدف مدن أو أحياء محددة" }, { k: "behavior", l: "🧠 سلوك المستخدم", d: "بناءً على تصفحه ومشترياته" }, { k: "intent", l: "🎯 نية الشراء المتوقعة", d: "AI يتوقع شراء خلال 24 ساعة" }];
  return (
    <div style={{ padding: "18px 16px" }}>
      <div style={{ fontWeight: 900, fontSize: 17, marginBottom: 16 }}>📍 استهداف ذكي</div>

          <div style={{ width: 20, height: 20, borderRadius: 6, border: `2px solid ${sel[o.k] ? C.violet : C.muted}`, background: sel[o.k] ? C.violet : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>{sel[o.k] && "✓"}</div>
          <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 13 }}>{o.l}</div><div style={{ fontSize: 11, color: C.muted }}>{o.d}</div></div>

          <div style={{ fontSize: 11, color: C.muted }}>2,840 عميل متوقع شراؤهم خلال 24 ساعة في فئتك — إعلانك سيظهر في اللحظة المثالية قبل الشراء</div>

    </div>

}
