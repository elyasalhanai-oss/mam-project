<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#07111F" />
<title>MAM — AI Commerce OS</title>
<style>
  html,body{margin:0;padding:0;background:#07111F;font-family:Arial,sans-serif;}
  #root{min-height:100vh;}
  #boot-error{display:none;color:#fff;padding:24px;direction:rtl;text-align:right;line-height:1.8;}
  #boot-error h2{color:#EF4444;margin-bottom:12px;}
  #boot-error pre{background:#111;padding:12px;border-radius:8px;overflow:auto;font-size:12px;color:#0f8;white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-error">
  <h2>⚠️ حدث خطأ أثناء تحميل التطبيق</h2>
  <p>الرجاء أخذ لقطة شاشة لهذا النص وإرساله للدعم الفني:</p>
  <pre id="boot-error-msg"></pre>
</div>
<script>
window.addEventListener('error', function(e) {
  var box = document.getElementById('boot-error');
  var msg = document.getElementById('boot-error-msg');
  if (box && msg) {
    box.style.display = 'block';
    msg.textContent = (e.message || 'Unknown error') + '\n\nFile: ' + (e.filename || '') + '\nLine: ' + (e.lineno || '') + '\nCol: ' + (e.colno || '');
  }
});
</script>
